<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yyyt03</title>
  <meta name="description" content="yyyt03 的个人页面">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-language="zh">
  <main class="page-shell">
    <section class="profile-card" aria-label="个人简介">
      <div class="language-switch" aria-label="Language switch">
        <span class="language-thumb" aria-hidden="true"></span>
        <button class="language-option is-active" type="button" data-lang-button="zh" aria-pressed="true">中文</button>
        <button class="language-option" type="button" data-lang-button="en" aria-pressed="false">EN</button>
      </div>
      <div class="intro-copy">
        <p
          class="eyebrow"
          data-i18n="eyebrow"
          data-zh="Personal page"
          data-en="Personal page"
        >Personal page</p>
        <h1
          data-i18n="heading"
          data-zh="嘿，我是 yyyt03。"
          data-en="Hi, I'm yyyt03."
        >嘿，我是 yyyt03。</h1>
        <p
          data-i18n="paragraph-1"
          data-zh="我是一名计算机相关方向的研究生。我喜欢把抽象的想法做成能运行、能展示、能继续迭代的东西。"
          data-en="I'm a graduate student in a computing-related field. I like turning abstract ideas into things that can run, be demonstrated, and continue to iterate."
        >我是一名计算机相关方向的研究生。我喜欢把抽象的想法做成能运行、能展示、能继续迭代的东西。</p>
        <p
          data-i18n="paragraph-2"
          data-zh="基于AI的冲击，我更喜欢理顺逻辑，并通过AI完成工作。"
          data-en="Driven by the impact of AI, I prefer to clarify logic and accomplish work through AI."
        >基于AI的冲击，我更喜欢理顺逻辑，并通过AI完成工作。</p>
        <p
          data-i18n="paragraph-3"
          data-zh="之前我通过AI制作过微信小程序/网页/油猴脚本/检查word格式小工具等等。"
          data-en="Previously, I have created WeChat mini-programs, web pages, Tampermonkey scripts, Word format checking tools, and more with the help of AI."
        >之前我通过AI制作过微信小程序/网页/油猴脚本/检查word格式小工具等等。</p>
      </div>
      <aside class="avatar-panel" aria-label="头像区域">
        <div class="avatar-frame">
          <img
            src="https://github.com/yyyt03.png"
            alt="yyyt03 的头像"
            data-i18n-alt="avatar-alt"
            data-zh-alt="yyyt03 的头像"
            data-en-alt="Portrait of yyyt03"
            width="280"
            height="280"
          >
        </div>
        <p
          class="avatar-caption"
          data-i18n="avatar-caption"
          data-zh="描述保留，链接稍后补充。"
          data-en="Description stays for now. Links will be added later."
        >描述保留，链接稍后补充。</p>
      </aside>
    </section>
  </main>
  <script src="./script.js"></script>
</body>
</html>
